---
layout: default
---
<article class="post-detail">
  <header class="wrap post-head">
    <p class="eyebrow">Günlük · <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%d.%m.%Y' }}</time></p>
    <h1>{{ page.title }}</h1>
  </header>
  <div class="wrap prose prose-narrow">
    {{ content }}
  </div>
</article>
