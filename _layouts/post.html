---
layout: default
---
<article class="post-detail">
  <div class="wrap">
    <div class="detail-col">
      <header class="post-head">
        <p class="eyebrow">Günlük · <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%d.%m.%Y' }}</time></p>
        <h1>{{ page.title }}</h1>
      </header>
      <div class="prose">
        {{ content }}
      </div>
    </div>
  </div>
</article>
