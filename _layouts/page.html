---
layout: default
---
<article class="page-detail">
  <div class="wrap">
    <div class="detail-col">
      <header class="post-head">
        {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
        <h1>{{ page.title }}</h1>
      </header>
      <div class="prose">
        {{ content }}
      </div>
    </div>
  </div>
</article>
