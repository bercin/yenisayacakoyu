---
layout: default
title: Projeler
permalink: /projeler/
---
<section class="section">
  <div class="wrap">
    <header class="post-head">
      <p class="eyebrow">Arşiv</p>
      <h1>Projeler</h1>
    </header>

    <div class="project-grid">
      {% assign items = site.projects | sort: 'order' %}
      {% for project in items %}
      <a class="project-card reveal {% cycle 'span-wide', 'span-narrow', 'span-narrow', 'span-wide' %}" href="{{ project.url | relative_url }}">
        <figure class="card-frame">
          <img src="{{ project.thumbnail | relative_url }}" alt="{{ project.title }} — proje görseli" loading="lazy">
        </figure>
        <div class="card-meta">
          <h3>{{ project.title }}</h3>
          <p class="card-client">{{ project.client }} · {{ project.year }}</p>
        </div>
      </a>
      {% endfor %}
    </div>
  </div>
</section>
